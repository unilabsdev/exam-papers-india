name: exam_papers_app
description: A production-ready competitive exam previous year papers app.
publish_to: 'none'
version: 1.0.4+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Typography
  google_fonts: ^6.2.1

  # Image caching
  cached_network_image: ^3.3.1

  # URL launching (for PDF open/download fallback)
  url_launcher: ^6.2.5

  # PDF caching & downloading
  http: ^1.2.0
  path_provider: ^2.1.0
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3

  # Share
  share_plus: ^10.0.0

  # Network connectivity
  connectivity_plus: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^27.1.48

  # Supabase
  supabase_flutter: ^2.8.4

  # In-app review
  in_app_review: ^2.0.9

  # Firebase
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.6
  firebase_crashlytics: ^4.3.6

  # Ads
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1D4ED8"
  adaptive_icon_foreground: "assets/images/app_logo.png"

