name            = "exam-papers-worker"
main            = "src/index.ts"
compatibility_date = "2024-09-23"

# ── R2 bucket binding ─────────────────────────────────────────────────────────
# Create the bucket first:  wrangler r2 bucket create papers
[[r2_buckets]]
binding     = "PAPERS_BUCKET"
bucket_name = "exam-papers"

# ── Secrets (set via CLI, never commit values here) ───────────────────────────
# Run these once after deploying:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put WORKER_API_KEY   ← optional, protects /list & /process
